<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant modern theme gradient matching portfolio accents -->
    <linearGradient id="favicon-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff1c75" />
      <stop offset="50%" stop-color="#863bff" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
    
    <!-- Subtle glow filter to ensure high visibility on both dark and light browser theme tabs -->
    <filter id="favicon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <g stroke="url(#favicon-gradient)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#favicon-glow)">
    <!-- Left Hexagon Bracket -->
    <path d="M 210,80 L 100,170 L 100,342 L 210,432" />
    <!-- Right Hexagon Bracket -->
    <path d="M 302,80 L 412,170 L 412,342 L 302,432" />
    <!-- Center T -->
    <path d="M 170,210 L 342,210.1" />
    <path d="M 256,210 L 256.1,370" />
  </g>
</svg>